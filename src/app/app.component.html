<div class="row">
  <div class="col-8">
    <div class="card">
      <div class="card-header bg-success">
        <h6>Employee List</h6>
      </div>
      <div class="card-body">
        <table class="table">
          <thead>
            <tr>
              <th>Employee ID</th>
              <th>Name</th>
              <th>City</th>
              <th>State</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Address</th>
              <th>Pincode</th>
            </tr>
          </thead>
          <tbody>
            <!-- Employee rows will be populated here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="col-4">
    <div class="card">
      <div class="card-header bg-success">
        <h6>New Employee</h6>
      </div>
      <div class="card-body">
        <div class="row">
          <!-- Form fields for adding a new employee will be placed here -->
           <div class="col-6">
            <label for="">Name</label>
            <input type="text" class="form-control form-control-sm" />
           </div>
           <div class="col-6">
            <label for="">City</label>
            <input type="text" class="form-control form-control-sm" />
           </div>
           <div class="col-6">
            <label for="">State</label>
            <input type="text" class="form-control form-control-sm" />
           </div>
           <div class="col-6">
            <label for="">Email</label>
            <input type="email" class="form-control form-control-sm" />
           </div>
           <div class="col-6">
            <label for="">Phone</label>
            <input type="text" class="form-control form-control-sm" />
           </div>
           <div class="col-12">
            <label for="">Address</label>
            <textarea class="form-control form-control-sm" rows="2"></textarea>
           </div>
           <div class="col-6">
            <label for="">Pincode</label>
            <input type="text" class="form-control form-control-sm" />
           </div>
        </div>
        <div class="row pt-2">
          <div class="col-6 text-center">
            <button class="btn btn-sm btn-secondary">Reset</button>
          </div>
          <div class="col-6">
            <button class="btn btn-sm btn-success">Save Employee</button>
          </div>          
        </div>
      </div>
    </div>
  </div>
</div>
